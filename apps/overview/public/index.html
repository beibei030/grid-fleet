<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0d1117" />
  <title>三所网格总看板 · 8088</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --panel2: #1f2630;
      --border: #30363d;
      --txt: #e6edf3;
      --mut: #8b949e;
      --green: #3fb950;
      --red: #f85149;
      --yellow: #d29922;
      --blue: #58a6ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--txt);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      line-height: 1.45;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(13, 17, 23, 0.94);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 14px 18px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    h1 { font-size: 18px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--mut); display: inline-block; }
    .dot.on { background: var(--green); box-shadow: 0 0 10px var(--green); }
    .dot.off { background: var(--red); }
    .meta { color: var(--mut); font-size: 12px; }
    nav { margin-left: auto; display: flex; gap: 8px; flex-wrap: wrap; }
    nav a {
      color: var(--txt);
      text-decoration: none;
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
    }
    main { max-width: 1280px; margin: 0 auto; padding: 18px; }
    .login {
      max-width: 360px;
      margin: 12vh auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px;
    }
    .login h2 { font-size: 18px; margin-bottom: 8px; }
    .login p { color: var(--mut); font-size: 13px; margin-bottom: 14px; }
    .login input, .login button {
      width: 100%;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
    }
    .login input {
      background: var(--bg);
      color: var(--txt);
      border: 1px solid var(--border);
      margin-bottom: 10px;
    }
    .login button { border: 0; background: var(--green); color: #fff; font-weight: 700; cursor: pointer; }
    .section-title {
      margin: 20px 0 10px;
      font-size: 13px;
      color: var(--mut);
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .kpis {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }
    .card, .kpi, .alert {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .kpi { padding: 16px; min-height: 104px; }
    .kpi label, .metric label {
      display: block;
      color: var(--mut);
      font-size: 12px;
      margin-bottom: 6px;
    }
    .kpi .value {
      font-size: 26px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }
    .sub { color: var(--mut); font-size: 12px; margin-top: 7px; }
    .up { color: var(--green); }
    .down { color: var(--red); }
    .warn { color: var(--yellow); }
    .alert {
      display: none;
      padding: 12px 14px;
      margin-bottom: 14px;
      border-color: #d2992255;
      color: #f2cc60;
      background: #2d250d;
    }
    .venues {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }
    .venue { overflow: hidden; }
    .venue-head {
      padding: 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .venue h2 { font-size: 17px; }
    .badge {
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .badge.ok { background: #14351f; color: var(--green); }
    .badge.busy { background: #332a12; color: var(--yellow); }
    .badge.needs_action, .badge.down { background: #3a1618; color: var(--red); }
    .venue-body { padding: 14px; }
    .metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
      margin-bottom: 12px;
    }
    .metric {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 10px;
      min-width: 0;
    }
    .metric span {
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      word-break: break-word;
    }
    .bots { display: grid; gap: 8px; }
    .bot {
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 10px;
    }
    .bot-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .bot-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      font-size: 12px;
      color: var(--mut);
    }
    .bot-grid b { color: var(--txt); font-weight: 600; }
    .table {
      width: 100%;
      border-collapse: collapse;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .table th, .table td {
      padding: 10px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      font-size: 13px;
      white-space: nowrap;
    }
    .table th { color: var(--mut); font-weight: 600; background: var(--panel2); }
    .table .total-row td { background: var(--panel2); font-weight: 700; }
    .table tr:last-child td { border-bottom: 0; }
    .scroll { overflow-x: auto; }
    @media (max-width: 980px) {
      .kpis { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .venues { grid-template-columns: 1fr; }
      nav { margin-left: 0; width: 100%; }
    }
    @media (max-width: 720px) {
      header { padding: 10px 12px; gap: 8px; }
      h1 { font-size: 16px; }
      nav a { font-size: 11px; padding: 5px 8px; }
      main { padding: 10px; }
      .section-title { margin: 14px 0 8px; font-size: 12px; }
      .kpis { gap: 8px; }
      .kpi { padding: 10px 11px; min-height: 76px; border-radius: 10px; }
      .kpi label, .metric label { font-size: 11px; margin-bottom: 4px; }
      .kpi .value { font-size: 19px; line-height: 1.15; }
      .sub { font-size: 10.5px; margin-top: 5px; }
      .venue-head { padding: 10px 11px; }
      .venue h2 { font-size: 15px; }
      .badge { font-size: 11px; padding: 4px 7px; }
      .venue-body { padding: 10px; }
      .metrics { gap: 7px; margin-bottom: 9px; }
      .metric { padding: 8px; border-radius: 8px; }
      .metric span { font-size: 12px; }
      .bot { padding: 8px; }
      .bot-title { font-size: 13px; margin-bottom: 6px; }
      .bot-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); font-size: 11px; gap: 5px; }
      .table th, .table td { padding: 7px 8px; font-size: 11px; }
      .alert { padding: 9px 10px; font-size: 12px; }
    }
    @media (max-width: 560px) {
      .kpis { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .kpi { min-height: 70px; }
      .kpi .value { font-size: 17px; }
      .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .table th, .table td { padding: 6px 7px; font-size: 10.5px; }
    }
    @media (max-width: 380px) {
      .kpis { grid-template-columns: 1fr; }
      .metrics { grid-template-columns: 1fr; }
      .kpi .value { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div id="loginGate" class="login" style="display:none">
    <h2>总看板认证</h2>
    <p>输入网格 Token 后读取 8088 聚合状态。</p>
    <input id="tokenIn" type="password" placeholder="Token" autocomplete="current-password" />
    <button id="tokenGo" type="button">进入看板</button>
  </div>

  <div id="app" style="display:none">
    <header>
      <span id="dot" class="dot"></span>
      <h1>三所网格总看板</h1>
      <span id="time" class="meta">等待数据</span>
      <nav id="nav"></nav>
    </header>

    <main>
      <div id="alert" class="alert"></div>

      <p class="section-title">总览</p>
      <section class="kpis">
        <div class="kpi">
          <label>今天净赚/亏</label>
          <div id="todayPnl" class="value">-</div>
          <div id="todaySub" class="sub">账本口径，Asia/Shanghai</div>
        </div>
        <div class="kpi">
          <label>今日成交量</label>
          <div id="todayVol" class="value">-</div>
          <div class="sub">三所合计</div>
        </div>
        <div class="kpi">
          <label>总权益</label>
          <div id="equity" class="value">-</div>
          <div id="equitySub" class="sub">Extended / RISEx / Decibel 合计</div>
        </div>
        <div class="kpi">
          <label>当前浮盈浮亏</label>
          <div id="unrealizedPnl" class="value">-</div>
          <div class="sub">仓位 mark 口径</div>
        </div>
        <div class="kpi">
          <label>三所网格健康</label>
          <div id="health" class="value">-</div>
          <div id="healthSub" class="sub">只统计 Extended / RISEx / Decibel</div>
        </div>
      </section>

      <p class="section-title">三所状态与参数</p>
      <section id="venues" class="venues"></section>

      <p class="section-title">当前持仓</p>
      <div class="scroll">
        <table class="table">
          <thead>
            <tr>
              <th>交易所</th>
              <th>市场</th>
              <th>方向</th>
              <th>数量</th>
              <th>入场价</th>
              <th>标记价</th>
              <th>价值</th>
              <th>浮盈亏</th>
            </tr>
          </thead>
          <tbody id="positions"></tbody>
        </table>
      </div>

      <p class="section-title">每日记录（日历）</p>
      <div class="meta">今天赚/亏按今日运行内权益变化计算；历史日期按总权益变化计算。手动出入金调整应保存在私有运行数据中，不写入开源源码。</div>
      <div class="scroll">
        <table class="table">
          <thead>
            <tr>
              <th>日期</th>
              <th>今天赚/亏</th>
              <th>总余额/权益</th>
              <th>今日成交量</th>
            </tr>
          </thead>
          <tbody id="calendarRows"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script>
    const TOKEN_KEY = "grid_overview_token";
    const VENUE_LINKS = [
      { key: "extended", label: "Extended", port: 8081 },
      { key: "risex", label: "RISEx", port: 8082 },
      { key: "decibel", label: "Decibel", port: 8083 },
    ];
    const params = new URLSearchParams(location.search);
    let token = params.get("token") || sessionStorage.getItem(TOKEN_KEY) || "";
    if (params.get("token")) {
      sessionStorage.setItem(TOKEN_KEY, token);
      history.replaceState({}, "", location.pathname);
    }
    let source = null;
    let timer = null;

    function el(id) { return document.getElementById(id); }
    function n(v) { const x = Number(v); return Number.isFinite(x) ? x : 0; }
    function usd(v) { return "$" + n(v).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
    function usdShort(v) { return "$" + n(v).toLocaleString("en-US", { maximumFractionDigits: 0 }); }
    function signed(v) {
      const x = n(v);
      const s = x > 0 ? "+" : "";
      return s + usd(x);
    }
    function currentPnl(row) {
      return n(row.todayRealizedPnl) + n(row.unrealizedPnl);
    }
    function signedOrDash(v) {
      return v === null || v === undefined ? "-" : signed(v);
    }
    function clsOrEmpty(v) {
      return v === null || v === undefined ? "" : cls(v);
    }
    function equityDelta(rows, index) {
      const row = rows[index];
      if (!row) return null;
      const explicit = Number(row.equityChange);
      const raw = Number.isFinite(explicit)
        ? explicit
        : (() => {
            const prev = rows[index + 1];
            return prev ? n(row.equity) - n(prev.equity) : null;
          })();
      return raw;
    }
    function todayRunDelta(ledger, currentEquity) {
      const points = ledger && Array.isArray(ledger.intraday) ? ledger.intraday : [];
      const first = points.find(p => Number.isFinite(Number(p.equity)) && Number(p.equity) > 0);
      if (!first) return null;
      return n(currentEquity) - n(first.equity);
    }
    function calendarPnl(ledger, rows, index) {
      const row = rows[index];
      if (!row) return null;
      if (ledger && row.day === ledger.dayKey) {
        return todayRunDelta(ledger, row.equity) ?? equityDelta(rows, index);
      }
      return equityDelta(rows, index);
    }
    function pct(v) { return (n(v) * 100).toFixed(1) + "%"; }
    function price(v) {
      const x = n(v);
      if (Math.abs(x) >= 1000) return x.toFixed(1);
      if (Math.abs(x) >= 10) return x.toFixed(2);
      return x.toFixed(4);
    }
    function cls(v) { return n(v) > 0 ? "up" : n(v) < 0 ? "down" : ""; }
    function statusLabel(status) {
      return status === "ok" ? "正常" : status === "busy" ? "处理中" : status === "down" ? "不可达" : "需处理";
    }
    function actionText(action) {
      return ({ wait: "等待", converge: "补齐/收敛", seed: "铺单", resume: "恢复", restart: "重启" })[action] || action || "-";
    }
    function portUrl(port) {
      return location.protocol + "//" + location.hostname + ":" + port + "/";
    }
    function authHeaders() {
      return token ? { Authorization: "Bearer " + token, "x-grid-token": token } : {};
    }

    function renderNav() {
      el("nav").innerHTML = VENUE_LINKS
        .map(v => `<a href="${portUrl(v.port)}" target="_blank" rel="noopener">${v.label} :${v.port}</a>`)
        .join("");
    }

    async function ensureMeta() {
      const r = await fetch("/api/meta", { cache: "no-store" });
      const meta = await r.json();
      if (meta.authRequired && !token) {
        el("loginGate").style.display = "block";
        el("app").style.display = "none";
        return false;
      }
      el("loginGate").style.display = "none";
      el("app").style.display = "block";
      return true;
    }

    function renderAlert(display) {
      const box = el("alert");
      const alerts = display.alerts || [];
      if (!alerts.length) {
        box.style.display = "none";
        box.textContent = "";
        return;
      }
      box.style.display = "block";
      box.textContent = alerts.join("；");
    }

    function renderVenue(v) {
      const ratio = v.expectedOrders > 0 ? v.openOrders / v.expectedOrders : v.openOrdersRatio;
      const bots = (v.bots || []).map(b => `
        <div class="bot">
          <div class="bot-title">
            <span>${b.name}</span>
            <span class="${b.outOfRange ? "down" : "up"}">${b.running ? "运行" : "停止"}${b.outOfRange ? " / 出区间" : ""}</span>
          </div>
          <div class="bot-grid">
            <span>价格 <b>${price(b.lastPrice)}</b></span>
            <span>挂单 <b>${b.openOrders}</b></span>
            <span>格数 <b>${b.gridCount ?? "-"}</b></span>
            <span>杠杆 <b>${b.leverage ?? "-"}x</b></span>
            <span>区间 <b>${price(b.lower)} - ${price(b.upper)}</b></span>
            <span>跳过带 <b>${b.skipBand ?? "-"}</b></span>
            <span>自动居中 <b>${b.autoRecenter === null ? "-" : b.autoRecenter ? "开" : "关"}</b></span>
            <span>浮盈亏 <b class="${cls(b.unrealized)}">${signed(b.unrealized)}</b></span>
          </div>
        </div>
      `).join("");

      return `
        <article class="card venue">
          <div class="venue-head">
            <div>
              <h2>${v.label}</h2>
              <div class="meta">:${v.port} · ${v.statusText} · 建议 ${actionText(v.action)}</div>
            </div>
            <span class="badge ${v.status}">${statusLabel(v.status)}</span>
          </div>
          <div class="venue-body">
            <div class="metrics">
              <div class="metric"><label>挂单完整度</label><span>${v.openOrders}/${v.expectedOrders} · ${pct(ratio)}</span></div>
              <div class="metric"><label>Bot</label><span>${v.botCount} 个</span></div>
              <div class="metric"><label>当前盈亏状态</label><span class="${cls(currentPnl(v))}">${signed(currentPnl(v))}</span></div>
              <div class="metric"><label>今日成交量</label><span>${usdShort(v.todayVolume)}</span></div>
              <div class="metric"><label>当前浮盈亏</label><span class="${cls(v.unrealizedPnl)}">${signed(v.unrealizedPnl)}</span></div>
              <div class="metric"><label>权益</label><span>${usd(v.equity)}</span></div>
            </div>
            <div class="bots">${bots || '<div class="sub">无 bot 数据</div>'}</div>
          </div>
        </article>
      `;
    }

    function renderPositions(rows) {
      const body = el("positions");
      if (!rows || !rows.length) {
        body.innerHTML = '<tr><td colspan="8" class="meta">当前无持仓</td></tr>';
        return;
      }
      body.innerHTML = rows.map(p => `
        <tr>
          <td>${p.venue}</td>
          <td>${p.market}</td>
          <td>${p.side === "short" ? "空" : "多"}</td>
          <td>${n(p.size).toFixed(6).replace(/0+$/, "").replace(/\.$/, "")}</td>
          <td>${price(p.entryPrice)}</td>
          <td>${price(p.markPrice)}</td>
          <td>${usd(p.valueUsd)}</td>
          <td class="${cls(p.unrealizedPnl)}">${signed(p.unrealizedPnl)}</td>
        </tr>
      `).join("");
    }

    function renderCalendar(ledger) {
      const body = el("calendarRows");
      const rows = ledger && Array.isArray(ledger.calendar) ? ledger.calendar : [];
      if (!rows.length) {
        body.innerHTML = '<tr><td colspan="4" class="meta">暂无每日记录</td></tr>';
        return;
      }
      const dayKey = ledger.dayKey || "";
      const deltas = rows.map((_, i) => calendarPnl(ledger, rows, i)).filter(v => v !== null && v !== undefined);
      const totalPnl = deltas.reduce((a, v) => a + n(v), 0);
      const totalVolume = rows.reduce((a, r) => a + n(r.todayVolume), 0);
      const currentEquity = rows.length ? n(rows[0].equity) : 0;
      body.innerHTML = rows.map((r, i) => {
        const isToday = r.day === dayKey;
        const pnl = calendarPnl(ledger, rows, i);
        return `
          <tr>
            <td>${r.day}${isToday ? "（今天）" : ""}</td>
            <td class="${clsOrEmpty(pnl)}">${signedOrDash(pnl)}</td>
            <td>${usd(r.equity)}</td>
            <td>${usdShort(r.todayVolume)}</td>
          </tr>
        `;
      }).join("") + `
        <tr class="total-row">
          <td>总计</td>
          <td class="${cls(totalPnl)}">${signed(totalPnl)}</td>
          <td>${usd(currentEquity)}</td>
          <td>${usdShort(totalVolume)}</td>
        </tr>
      `;
    }

    function render(data) {
      const display = data.display || {};
      const h = display.headline || {};
      const gh = display.gridHealth || {};
      const calendarRows = data.ledger && Array.isArray(data.ledger.calendar) ? data.ledger.calendar : [];
      const headlinePnl = calendarPnl(data.ledger || {}, calendarRows, 0) ?? 0;
      el("todayPnl").textContent = signed(headlinePnl);
      el("todayPnl").className = "value " + cls(headlinePnl);
      el("todaySub").textContent = (data.ledger && data.ledger.dayKey ? data.ledger.dayKey : "今日") + " · 今日运行内权益变化";
      el("todayVol").textContent = usdShort(h.todayVolume);
      el("equity").textContent = usd(h.equity);
      el("equitySub").textContent = `挂单 ${gh.openOrders ?? 0}/${gh.expectedOrders ?? 0}`;
      el("unrealizedPnl").textContent = signed(h.unrealizedPnl);
      el("unrealizedPnl").className = "value " + cls(h.unrealizedPnl);
      el("health").textContent = `${gh.healthy ?? 0}/${gh.total ?? 3}`;
      el("health").className = "value " + (gh.needsAction ? "warn" : "up");
      el("healthSub").textContent = gh.summary || "等待三所状态";
      renderAlert(display);
      el("venues").innerHTML = (display.venueCards || []).map(renderVenue).join("");
      renderPositions(data.allPositions || []);
      renderCalendar(data.ledger || {});
      el("time").textContent = "更新 " + new Date(data.updatedAt || Date.now()).toLocaleTimeString("zh-CN");
      el("dot").className = "dot on";
    }

    async function pollOnce() {
      try {
        const r = await fetch("/api/overview", { headers: authHeaders(), cache: "no-store" });
        if (r.status === 401) {
          sessionStorage.removeItem(TOKEN_KEY);
          token = "";
          location.reload();
          return;
        }
        if (!r.ok) throw new Error("HTTP " + r.status);
        render(await r.json());
      } catch (e) {
        el("dot").className = "dot off";
        el("time").textContent = "读取失败: " + (e && e.message ? e.message : e);
      }
    }

    async function start() {
      renderNav();
      const ok = await ensureMeta();
      if (!ok) return;
      await pollOnce();
      clearInterval(timer);
      timer = setInterval(pollOnce, 3000);
      if (window.EventSource && token) {
        if (source) source.close();
        source = new EventSource("/api/stream?token=" + encodeURIComponent(token));
        source.onmessage = ev => render(JSON.parse(ev.data));
        source.onerror = () => { if (source) source.close(); source = null; };
      }
    }

    el("tokenGo").onclick = function () {
      token = el("tokenIn").value.trim();
      if (!token) return;
      sessionStorage.setItem(TOKEN_KEY, token);
      start();
    };
    el("tokenIn").onkeydown = function (e) {
      if (e.key === "Enter") el("tokenGo").click();
    };
    start();
  </script>
</body>
</html>
