name: typecheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [decibel-grid, overview]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        working-directory: apps/${{ matrix.app }}
        run: npm install
      - name: Typecheck
        working-directory: apps/${{ matrix.app }}
        run: npm run typecheck
